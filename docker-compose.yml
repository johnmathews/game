services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/game.db}
    volumes:
      - db-data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./godot/export:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  db-data:
